version: '3.8'

services:
  app:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./mlflow:/app/mlflow
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - lakehouse

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow==2.11.1 &&
               mlflow server --host 0.0.0.0 --port 5000 
               --backend-store-uri sqlite:///mlflow/mlflow.db 
               --default-artifact-root /app/mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow:/app/mlflow
    networks:
      - lakehouse

networks:
  lakehouse:
    driver: bridge
